name: 輸出ラボ 自動投稿

on:
  schedule:
    # X APIは「URLを含む投稿」が1件$0.20（2026/4〜）。カード用URLを含むため
    # 投稿頻度でコストが決まる。当面4時間ごと=6本/日（≈$1.2/日≈$36/月）に抑える。
    - cron: '30 */4 * * *'   # 4時間ごと（6本/日）
  workflow_dispatch:         # 手動実行テスト用

jobs:
  tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install tweepy anthropic requests pytz

      - name: Tweet
        env:
          TWITTER_API_KEY:             ${{ secrets.YUSHUTSU_TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.YUSHUTSU_TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.YUSHUTSU_TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.YUSHUTSU_TWITTER_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          KV_REST_API_URL:             ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN:           ${{ secrets.KV_REST_API_TOKEN }}
          GMAIL_USERNAME:              ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD:          ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/sns_bot/tweet_auto.py

      - name: エラー通知メール
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ 輸出ラボBot エラー発生"
          to: chikara0323@gmail.com
          from: "輸出ラボBot <${{ secrets.GMAIL_USERNAME }}>"
          body: |
            輸出ラボ自動投稿でエラーが発生しました。

            ▼ エラーログを確認
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ─────────────────────────────
            ワークフロー : ${{ github.workflow }}
            トリガー     : ${{ github.event_name }}
