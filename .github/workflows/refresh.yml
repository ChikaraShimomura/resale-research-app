name: Background Refresh (Rakuten + eBay + Gemini)

on:
  schedule:
    - cron: '0 */2 * * *'   # 2時間ごと
  workflow_dispatch:          # 手動実行ボタン

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # 最大60分（Vercelの60秒制限なし）

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run refresh script
        env:
          RAKUTEN_APP_ID:       ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY:   ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          EBAY_APP_ID:          ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET:   ${{ secrets.EBAY_CLIENT_SECRET }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          KV_REST_API_URL:      ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN:    ${{ secrets.KV_REST_API_TOKEN }}
        run: node scripts/refresh.mjs
