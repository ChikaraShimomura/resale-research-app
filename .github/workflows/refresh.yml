name: Background Refresh (Rakuten + eBay + Claude Haiku)

on:
  schedule:
    - cron: '0 */6 * * *'   # 6時間ごと
  workflow_dispatch:          # 手動実行ボタン

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120      # 最大120分（102キーワード×5ページ対応）

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run refresh script
        env:
          RAKUTEN_APP_ID:       ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY:   ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          EBAY_APP_ID:          ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET:   ${{ secrets.EBAY_CLIENT_SECRET }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          KV_REST_API_URL:      ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN:    ${{ secrets.KV_REST_API_TOKEN }}
        run: node scripts/refresh.mjs

      - name: エラー通知メール
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ 輸出ラボ Refresh失敗（タイムアウトの可能性）"
          to: chikara0323@gmail.com
          from: "輸出ラボBot <${{ secrets.GMAIL_USERNAME }}>"
          body: |
            商品データの更新処理が失敗しました（タイムアウトの可能性あり）。
            このまま放置すると商品データが空になり、自動投稿がスキップされます。

            ▼ エラーログを確認
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ─────────────────────────────
            ワークフロー : ${{ github.workflow }}
            トリガー     : ${{ github.event_name }}
